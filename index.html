<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora CCTV Pro - Gratis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora gratuita de almacenamiento, ancho de banda y consumo PoE para cámaras de seguridad CCTV.">
  <meta name="keywords" content="cctv, calculadora cámaras ip, almacenamiento nvr, bitrate cámaras, poe consumo">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #1e293b;
      color: white;
    }

    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .resultado {
      font-size: 20px;
      margin-top: 10px;
      color: #22c55e;
    }

    .info {
      margin-top: 30px;
      font-size: 14px;
      color: #ccc;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<header>📡 Calculadora CCTV Profesional</header>

<div class="container">

  <div class="card">
    <h2>Almacenamiento</h2>

    <input type="number" id="camaras" placeholder="Cantidad de cámaras">
    <input type="number" id="bitrate" placeholder="Bitrate (Mbps)">
    <input type="number" id="dias" placeholder="Días de grabación">

    <button onclick="calcStorage()">Calcular</button>

    <div class="resultado" id="resStorage"></div>
  </div>

  <div class="card">
    <h2>Ancho de banda</h2>

    <input type="number" id="camaras2" placeholder="Cantidad de cámaras">
    <input type="number" id="bitrate2" placeholder="Bitrate (Mbps)">

    <button onclick="calcBandwidth()">Calcular</button>

    <div class="resultado" id="resBandwidth"></div>
  </div>

  <div class="card">
    <h2>Consumo PoE</h2>

    <input type="number" id="camaras3" placeholder="Cantidad de cámaras">
    <input type="number" id="consumo" placeholder="Consumo por cámara (Watts)">

    <button onclick="calcPoe()">Calcular</button>

    <div class="resultado" id="resPoe"></div>
  </div>

</div>

<div class="info">
  <p>
    Esta herramienta te permite calcular el almacenamiento necesario para sistemas de videovigilancia (CCTV), 
    el ancho de banda requerido y el consumo eléctrico PoE según la cantidad de cámaras y su configuración.
  </p>
</div>

<script>
function calcStorage() {
  let c = document.getElementById("camaras").value;
  let b = document.getElementById("bitrate").value;
  let d = document.getElementById("dias").value;

  let total = c * b * 0.0108 * d;

  document.getElementById("resStorage").innerText =
    total.toFixed(2) + " TB necesarios";
}

function calcBandwidth() {
  let c = document.getElementById("camaras2").value;
  let b = document.getElementById("bitrate2").value;

  let total = c * b;

  document.getElementById("resBandwidth").innerText =
    total + " Mbps totales";
}

function calcPoe() {
  let c = document.getElementById("camaras3").value;
  let w = document.getElementById("consumo").value;

  let total = c * w;

  document.getElementById("resPoe").innerText =
    total + " Watts totales necesarios";
}
</script>

</body>
</html>
